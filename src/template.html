<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyWeatherApp</title>
</head>

<body>
  <div class="mainContainer">
    <div class="toprow">
      <h1 id="welcomeMsg">Pick a city to see how it`s looking outside.</h1>
      <form id="searchForm">
        <input type="text" placeholder="Write down the city name here, then press Enter" id="search" />
      </form>    
    </div>

    <div class="weatherDetails active">
      <div class="mainForecast">
        <h2 class="cityName">Jakarta</h2>
        <div class="iconContainer"></div>
        <h1 class="temp">28°C</h1>
      </div>
      <div class="additionalInfos"></div>
    </div>
  </div>
</body>

</html>
